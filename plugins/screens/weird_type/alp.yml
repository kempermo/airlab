name: na.weird_type
title: Weird Type
version: v0.1.0
binary:
  screen: ./main.wasm
config:
  screen:
    sections:
      - title: Font
        items:
          - key: font
            title: Font
            type: string
            default: pixel
            options:
              - value: pixel
                label: Pixel Square
              - value: comic
                label: Comic Sans Bold
      - title: Values
        items:
          - key: sensor
            title: Sensor
            type: string
            default: co2
            options:
              - value: co2
                label: CO2
              - value: tmp
                label: Temperature
              - value: hum
                label: Humidity
              - value: voc
                label: VOC
              - value: nox
                label: NOx
              - value: prs
                label: Pressure
